<!DOCTYPE html>
<html>
<head>
    <title>PDF Viewer</title>
</head>
<body>

<div class="container">
    <h1>📚 My Notes PDF</h1>

    <a href="englishh.pdf" target="_blank" class="pdf-button">
        📄 Open PDF
    </a>

</div>
<style>
/* Body style */
body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Main container */
.container {
    text-align: center;
    background: white;
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    width: 90%;
    max-width: 400px;
}

/* Title */
h1 {
    color: #333;
    margin-bottom: 30px;
}

/* PDF button */
.pdf-button {
    display: inline-block;
    padding: 12px 25px;
    background: #4facfe;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    font-size: 18px;
    transition: 0.3s;
}

/* Hover effect */
.pdf-button:hover {
    background: #0077ff;
    transform: scale(1.05);
}

/* Mobile responsive */
@media (max-width: 500px) {
    .container {
        padding: 25px;
    }

    h1 {
        font-size: 20px;
    }

    .pdf-button {
        font-size: 16px;
        padding: 10px 20px;
    }
}
</style>
</body>
</html>
